<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- no-flash theme applier — same `up-theme` localStorage convention as the portfolio (this
     site is its own origin with its own storage; the shared key just keeps the mental model
     identical: explicit choice → OS preference). -->
<script>(function(){try{
  var t=localStorage.getItem('up-theme');
  if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme:light)').matches)?'light':'dark';
  document.documentElement.dataset.theme=t;
}catch(e){}})();</script>
<meta name="theme-color" content="#060910" data-dark="#060910" />
<title>Ultraplatform · Documentation</title>
<meta name="description" content="Documentation for Ultraplatform — a generic, file-or-GitLab-backed platform map engine: quickstart, configuration, sources, API." />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="canonical" href="https://franroa.github.io/ultraplatform-documentation/" />
<style>
  :root{--bg:#060910;--panel:#0e1526;--line:rgba(130,160,230,.16);--fg:#e8eefc;--muted:#8b97b8;--dim:#5c6688;
    --cyan:#7fd4ff;--violet:#b69bff;--orange:#ffb36b;--green:#34d399}
  /* light theme — every reading surface (see the portfolio's light-mode gotcha note in
     skills/improve-platform-map: literals need their own override, only vars switch for free) */
  :root[data-theme="light"]{
    --bg:#f6f8fc;--panel:#ffffff;--line:rgba(30,52,96,.16);--fg:#0f1a33;--muted:#54617e;--dim:#7c88a8;
    --cyan:#0e79b0;--violet:#6d4fd0;--orange:#b45f17;--green:#0e9e6a;
    color-scheme:light;
  }
  :root[data-theme="light"] main h2{color:#1c3a63}
  :root[data-theme="light"] main h3{color:#2a4a7a}
  :root[data-theme="light"] main p,:root[data-theme="light"] main ul,:root[data-theme="light"] main ol{color:#33405f}
  :root[data-theme="light"] main code{color:#1c3a63}
  :root[data-theme="light"] main th{color:#1c3a63}
  :root[data-theme="light"] main pre{background:#0c1326}   /* code stays a dark terminal block, like the portfolio */
  :root[data-theme="light"] main pre code{color:#c7d6f5}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font:15.5px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:var(--cyan);text-decoration:none} a:hover{text-decoration:underline}
  /* top navbar — same logic as the portfolio's nav.js: a horizontal bar that collapses into a
     hamburger + dropdown below 1150px, rather than a sidebar that merely wraps on mobile */
  header{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:14px;padding:13px 22px;
    background:rgba(6,9,16,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  /* the bar's glass background is a LITERAL (translucent dark), not a var — it needs its own
     light override or the menu stays dark while the page goes light (the exact gotcha the
     portfolio's nav.js light block handles) */
  :root[data-theme="light"] header{background:rgba(246,248,252,.85)}
  header .logo{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px;color:var(--fg);font-size:16px;text-decoration:none}
  header .b{width:30px;height:30px;border-radius:8px;flex:0 0 auto;display:block} /* the Ultraplatform mark (favicon.svg) */
  header .links{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  header .links a{font-size:13.5px;color:var(--muted);text-decoration:none;transition:color .18s;white-space:nowrap}
  header .links a:hover,header .links a.on{color:var(--fg);text-decoration:none}
  header .navburger{display:none;margin-left:auto;background:none;border:1px solid var(--line);border-radius:9px;color:var(--fg);
    font-size:17px;padding:4px 10px;cursor:pointer;font-family:inherit}
  #dtheme-toggle{margin-left:auto;width:30px;height:30px;border-radius:9px;display:inline-flex;flex:0 0 auto;
    align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--line);
    background:transparent;color:var(--muted);transition:border-color .15s,color .15s}
  #dtheme-toggle:hover{color:var(--fg);border-color:rgba(127,212,255,.5)}
  @media(max-width:1150px){
    header .logo span:last-child{display:none}
    header .navburger{display:block}
    #dtheme-toggle{margin-left:8px}
    header .links{display:none}
    header .links.open{display:flex;position:fixed;top:60px;left:0;right:0;flex-direction:column;
      align-items:flex-start;gap:2px;background:rgba(6,9,16,.97);border-bottom:1px solid var(--line);padding:10px 22px 16px;max-height:calc(100vh - 60px);overflow-y:auto}
    header .links.open a{padding:9px 2px;font-size:15px;width:100%}
  }
  :root[data-theme="light"] header .links.open{background:rgba(246,248,252,.97)}
  .shell{max-width:860px;margin:0 auto;padding:86px 24px 70px}
  main{min-width:0}
  main h1{font-size:30px;letter-spacing:-.02em;margin:6px 0 16px}
  main h2{font-size:20px;margin:30px 0 10px;color:#dfe7fb;scroll-margin-top:80px}
  main h3{font-size:16px;margin:22px 0 8px;color:#bcd0ff}
  main p{color:#c4cee6;margin:0 0 14px}
  main ul,main ol{margin:0 0 14px 22px;color:#c4cee6} main li{margin-bottom:6px}
  main code{background:rgba(120,150,255,.13);padding:1px 6px;border-radius:5px;font:12.8px ui-monospace,Menlo,monospace;color:#cfe0ff}
  main pre{background:rgba(6,10,22,.85);border:1px solid var(--line);border-radius:12px;padding:14px 16px;overflow-x:auto;margin:0 0 16px}
  main pre code{background:none;padding:0}
  main .tblwrap{overflow-x:auto;margin:0 0 16px}
  main table{border-collapse:collapse;font-size:13.5px;min-width:480px}
  main th,main td{border:1px solid var(--line);padding:8px 12px;text-align:left;vertical-align:top}
  main th{color:#bcd0ff;background:rgba(127,212,255,.06)}
  main blockquote{border-left:3px solid var(--cyan);padding:8px 14px;margin:0 0 14px;background:rgba(127,212,255,.05);border-radius:0 10px 10px 0}
  footer{border-top:1px solid var(--line);text-align:center;color:var(--dim);font-size:13px;padding:26px}
  /* "On this page" — a floating anchor list right of the 860px shell; only when the viewport
     leaves room for it and the page has enough h2s to be worth navigating */
  .toc{position:fixed;top:96px;right:max(24px,calc(50vw - 430px - 236px));width:210px;display:none;font-size:12.5px;line-height:1.45}
  @media(min-width:1360px){.toc.has{display:block}}
  .toc .toct{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);margin:0 0 6px 14px}
  .toc a{display:block;padding:4px 8px 4px 12px;border-left:2px solid var(--line);color:var(--muted);text-decoration:none}
  .toc a:hover{color:var(--fg);text-decoration:none}
  .toc a.on{color:var(--fg);border-left-color:var(--cyan)}
  /* narrow viewports: the same list, collapsed inline at the top of the page instead */
  .toci{display:none;margin:0 0 20px;border:1px solid var(--line);border-radius:11px;background:var(--panel)}
  .toci summary{cursor:pointer;padding:9px 14px;font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
  .toci a{display:block;padding:6px 14px 6px 26px;font-size:13.5px;color:var(--muted);text-decoration:none}
  .toci a:hover{color:var(--fg);text-decoration:none}
  .toci div{padding-bottom:8px}
  @media(max-width:1359px){.toci.has{display:block}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header id="dnav">
  <a class="logo" href="#p=overview"><img class="b" src="favicon.svg" alt="" width="30" height="30"><span>Ultraplatform&nbsp;·&nbsp;Docs</span></a>
  <button class="navburger" type="button" aria-label="Menu" aria-expanded="false" aria-controls="dnav-links">☰</button>
  <div class="links" id="dnav-links">
    <a data-p="overview" href="#p=overview">Overview</a>
    <a data-p="quickstart" href="#p=quickstart">Quickstart</a>
    <a data-p="configuration" href="#p=configuration">Configuration</a>
    <a data-p="sources" href="#p=sources">Sources</a>
    <a data-p="cli" href="#p=cli">CLI</a>
    <a data-p="new-repo" href="#p=new-repo">New repo</a>
    <a data-p="new-platform" href="#p=new-platform">New platform</a>
    <a data-p="api" href="#p=api">API</a>
    <a data-p="skills" href="#p=skills">Skills</a>
    <a data-p="showcase" href="#p=showcase">Showcase</a>
    <a href="https://franroa.github.io/platform-engineer/ultraplatform.html">Live showcase ↗</a>
    <a href="https://franroa.github.io/platform-engineer/">Portfolio ↗</a>
  </div>
  <button id="dtheme-toggle" type="button" aria-label="Switch theme"></button>
</header>
<div class="shell">
  <main id="main">Loading…</main>
</div>
<nav class="toc" id="toc" aria-label="On this page"></nav>
<footer>Ultraplatform documentation — generated artifact; the source of truth is the private engine repository.</footer>
<!-- self-hosted (same v12.0.2 the portfolio vendors) — a CDN copy meant first render waited
     on a third-party origin before ANY page could parse -->
<script src="marked.min.js"></script>
<script>
  const PAGES=['overview','quickstart','configuration','sources','cli','new-repo','new-platform','api','skills','showcase'];
  const main=document.getElementById('main');
  /* every page is a few KB of markdown — fetch each at most once per visit and keep it in
     memory, so navbar clicks after the first are instant instead of a CDN round-trip each
     (the old `cache:'no-store'` forbade the browser from ever reusing a response) */
  const MD={};
  function loadMd(p){
    return MD[p]||(MD[p]=fetch('pages/'+p+'.md').then(r=>{
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.text();
    }).catch(e=>{delete MD[p];throw e;}));
  }
  async function show(p){
    if(!PAGES.includes(p))p='overview';
    document.querySelectorAll('#dnav-links a[data-p]').forEach(a=>a.classList.toggle('on',a.dataset.p===p));
    // two quick show() calls may resolve out of order — only the latest may render, or an
    // interleaved pair leaves a stale body / a duplicated inline TOC
    const req=(show._req=(show._req||0)+1);
    try{
      const md=await loadMd(p);
      if(req!==show._req)return;
      main.innerHTML=marked.parse(md);
      main.querySelectorAll('table').forEach(t=>{const w=document.createElement('div');w.className='tblwrap';t.replaceWith(w);w.appendChild(t);});
      buildToc();
      scrollTo(0,0);
    }catch(e){main.textContent='failed to load: '+e.message;}
  }
  /* "On this page": one link per rendered h2 (shown from 2 up), active section tracked while
     scrolling. Rebuilt on every page switch; the old observer is dropped with it. */
  let tocObs=null;
  function buildToc(){
    const toc=document.getElementById('toc'); if(tocObs){tocObs.disconnect();tocObs=null;}
    main.querySelectorAll('.toci').forEach(e=>e.remove());   // idempotent across rebuilds
    const hs=[...main.querySelectorAll('h2')];
    hs.forEach(h=>{ if(!h.id) h.id='s-'+h.textContent.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); });
    toc.classList.toggle('has',hs.length>=2);
    if(hs.length<2){toc.innerHTML='';return;}
    toc.innerHTML='<p class="toct">On this page</p>'+hs.map(h=>'<a href="#'+h.id+'" data-t="'+h.id+'">'+h.textContent+'</a>').join('');
    /* narrow viewports get the same list as a collapsed box above the content. The links are
       intercepted (scrollIntoView, no hash write) — a native #anchor would clobber the #p=
       route and hashchange would yank the reader back to Overview. */
    const inline=document.createElement('details'); inline.className='toci has';
    inline.innerHTML='<summary>On this page</summary><div>'+hs.map(h=>'<a href="#'+h.id+'" data-t="'+h.id+'">'+h.textContent+'</a>').join('')+'</div>';
    inline.addEventListener('click',e=>{ const a=e.target.closest('a'); if(!a)return; e.preventDefault();
      inline.open=false; const t=document.getElementById(a.dataset.t);
      if(t) t.scrollIntoView({behavior:matchMedia('(prefers-reduced-motion:reduce)').matches?'auto':'smooth',block:'start'}); });
    const h1=main.querySelector('h1');
    if(h1) h1.after(inline); else main.prepend(inline);
    const links=[...toc.querySelectorAll('a')];
    toc.onclick=e=>{ const a=e.target.closest('a'); if(!a)return; e.preventDefault();
      const t=document.getElementById(a.dataset.t); if(!t)return;
      const rm=matchMedia('(prefers-reduced-motion:reduce)').matches;
      t.scrollIntoView({behavior:rm?'auto':'smooth',block:'start'}); };
    tocObs=new IntersectionObserver(es=>{
      es.forEach(x=>{ if(x.isIntersecting) links.forEach(a=>a.classList.toggle('on',a.dataset.t===x.target.id)); });
    },{rootMargin:'-15% 0px -70% 0px'});
    hs.forEach(h=>tocObs.observe(h));
  }
  const fromHash=()=>show((location.hash.match(/p=([a-z-]+)/)||[])[1]||'overview');
  addEventListener('hashchange',fromHash); fromHash();
  /* prefetch the remaining pages once the browser is idle — all ten together are ~27 KB,
     cheaper than one image, and it makes every later menu click render from memory */
  (window.requestIdleCallback||function(f){setTimeout(f,1200);})(function(){
    PAGES.forEach(p=>loadMd(p).catch(function(){}));
  });

  /* top navbar burger — same open/close/Escape/click-outside logic as the portfolio's nav.js */
  (function(){
    const nav=document.getElementById('dnav'), burger=nav.querySelector('.navburger'), links=nav.querySelector('.links');
    function setOpen(open){ links.classList.toggle('open',open); burger.setAttribute('aria-expanded',open?'true':'false'); }
    burger.addEventListener('click',e=>{ e.stopPropagation(); setOpen(!links.classList.contains('open')); });
    document.addEventListener('click',e=>{ if(!e.target.closest('#dnav')) setOpen(false); });
    document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&links.classList.contains('open')){ setOpen(false); burger.focus(); } });
    links.addEventListener('click',e=>{ if(e.target.closest('a')) setOpen(false); });
  })();

  /* light/dark toggle — same preference order as the portfolio: explicit choice → OS pref */
  (function(){
    const KEY='up-theme', root=document.documentElement, btn=document.getElementById('dtheme-toggle');
    const current=()=>root.dataset.theme==='light'?'light':'dark';
    function syncMeta(){ const m=document.querySelector('meta[name="theme-color"]'); if(!m)return;
      m.setAttribute('content',current()==='light'?'#eef2fb':(m.dataset.dark||'#060910')); }
    function paint(){ const toLight=current()==='dark';
      btn.setAttribute('aria-label',toLight?'Switch to light theme':'Switch to dark theme'); btn.title=btn.getAttribute('aria-label');
      btn.innerHTML=toLight
        ?'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.4M12 19.6V22M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M2 12h2.4M19.6 12H22M4.9 19.1l1.7-1.7M17.4 6.6l1.7-1.7"/></svg>'
        :'<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8z"/></svg>'; }
    paint(); syncMeta();
    btn.addEventListener('click',()=>{ const t=current()==='dark'?'light':'dark';
      root.dataset.theme=t; try{localStorage.setItem(KEY,t);}catch(e){} paint(); syncMeta(); });
    try{ const mq=matchMedia('(prefers-color-scheme:light)');
      mq.addEventListener&&mq.addEventListener('change',e=>{ let stored; try{stored=localStorage.getItem(KEY);}catch(x){}
        if(!stored){ root.dataset.theme=e.matches?'light':'dark'; paint(); syncMeta(); } });
    }catch(e){}
  })();

  /* wheel→horizontal shim for wide tables/code */
  addEventListener('wheel',function(e){
    if(e.ctrlKey||Math.abs(e.deltaX)>Math.abs(e.deltaY))return;
    let el=e.target;
    for(;el&&el!==document.body;el=el.parentElement){
      const s=getComputedStyle(el);
      if((s.overflowX==='auto'||s.overflowX==='scroll')&&el.scrollWidth>el.clientWidth+1){
        const before=el.scrollLeft;el.scrollLeft+=e.deltaY;
        if(el.scrollLeft!==before)e.preventDefault();return;}
    }
  },{passive:false});
</script>
</body>
</html>
