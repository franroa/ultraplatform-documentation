<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ultraplatform mark (2D): nested governance envelopes (rings) around a flat platform
       hexagon, with one region orbiting — the whole thesis in one flat glyph. -->
  <defs>
    <linearGradient id="upg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fd4ff"/><stop offset="1" stop-color="#b69bff"/>
    </linearGradient>
    <linearGradient id="uphex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5e3ff"/><stop offset=".55" stop-color="#7fd4ff"/><stop offset="1" stop-color="#b69bff"/>
    </linearGradient>
    <radialGradient id="upbg" cx="38%" cy="28%" r="85%">
      <stop offset="0" stop-color="#131f3d"/><stop offset="1" stop-color="#060910"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#upbg)"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.4" fill="none" stroke="url(#upg)" stroke-opacity=".4" stroke-width="1.5"/>
  <!-- governance envelopes: outer faint, inner brighter -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="url(#upg)" stroke-opacity=".22" stroke-width="1.4"/>
  <circle cx="32" cy="32" r="16.5" fill="none" stroke="url(#upg)" stroke-opacity=".42" stroke-width="1.4"/>
  <!-- orbit ring + the region satellite -->
  <ellipse cx="32" cy="32" rx="27" ry="10" fill="none" stroke="url(#upg)" stroke-width="1.9" stroke-opacity=".9" transform="rotate(-24 32 32)"/>
  <!-- flat platform: top-down hexagon tile -->
  <path d="M32 20 L42.4 26 L42.4 38 L32 44 L21.6 38 L21.6 26 Z" fill="url(#uphex)"/>
  <path d="M32 27.2 L36.2 29.6 L36.2 34.4 L32 36.8 L27.8 34.4 L27.8 29.6 Z" fill="#0a1226" fill-opacity=".28"/>
  <!-- region satellite over the orbit, top-right -->
  <g transform="rotate(-24 32 32)">
    <circle cx="59" cy="32" r="3.4" fill="#ffb36b"/>
    <circle cx="59" cy="32" r="5.4" fill="none" stroke="#ffb36b" stroke-opacity=".35" stroke-width="1.4"/>
  </g>
</svg>
