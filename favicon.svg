<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ultraplatform mark: nested governance envelopes (rings) around an isometric platform
       block, with one region orbiting — the whole thesis in one glyph. -->
  <defs>
    <linearGradient id="upg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fd4ff"/><stop offset="1" stop-color="#b69bff"/>
    </linearGradient>
    <linearGradient id="uptop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5e3ff"/><stop offset="1" stop-color="#7fd4ff"/>
    </linearGradient>
    <radialGradient id="upbg" cx="38%" cy="28%" r="85%">
      <stop offset="0" stop-color="#131f3d"/><stop offset="1" stop-color="#060910"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#upbg)"/>
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.4" fill="none" stroke="url(#upg)" stroke-opacity=".4" stroke-width="1.5"/>
  <!-- envelopes: outer faint, inner brighter -->
  <circle cx="32" cy="32" r="23" fill="none" stroke="url(#upg)" stroke-opacity=".22" stroke-width="1.4"/>
  <circle cx="32" cy="32" r="16.5" fill="none" stroke="url(#upg)" stroke-opacity=".4" stroke-width="1.4"/>
  <!-- orbit + the region satellite (drawn under the block; the block occludes the middle) -->
  <g transform="rotate(-24 32 32)">
    <ellipse cx="32" cy="32" rx="27" ry="10" fill="none" stroke="url(#upg)" stroke-width="1.9" stroke-opacity=".9"/>
    <circle cx="59" cy="32" r="3.4" fill="#ffb36b"/>
    <circle cx="59" cy="32" r="5.4" fill="none" stroke="#ffb36b" stroke-opacity=".35" stroke-width="1.4"/>
  </g>
  <!-- isometric platform block -->
  <g stroke="#0a1226" stroke-width=".8" stroke-linejoin="round">
    <path d="M32 19 L45.5 26.9 L32 34.8 L18.5 26.9 Z" fill="url(#uptop)"/>
    <path d="M18.5 26.9 L32 34.8 L32 45 L18.5 37.1 Z" fill="#4f74d9"/>
    <path d="M45.5 26.9 L32 34.8 L32 45 L45.5 37.1 Z" fill="#6d4fd0"/>
  </g>
</svg>
